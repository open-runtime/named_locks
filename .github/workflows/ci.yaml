# Generated by runtime_ci_tooling v0.23.10
# Configured via .runtime_ci/config.json — after `dart pub global activate` for runtime_ci_tooling, run `dart pub global run runtime_ci_tooling:manage_cicd update --workflows` to regenerate.
# Policy: test artifact retention-days = 7 (applied consistently).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-check:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.bot_check.outputs.should_run }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Check for bot commit
        id: bot_check
        run: |
          AUTHOR=$(git log -1 --format='%an')
          MSG=$(git log -1 --format='%s')
          echo "Commit author: $AUTHOR"
          echo "Commit subject: $MSG"
          if [[ "$AUTHOR" == "github-actions[bot]" ]] || [[ "$MSG" == *"[skip ci]"* ]] || [[ "$MSG" == "bot(format)"* ]]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Bot commit detected — skipping CI."
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

  auto-format:
    needs: pre-check
    if: needs.pre-check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      sha: ${{ steps.format-push.outputs.sha || github.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref }}
          token: ${{ secrets.TSAVO_AT_PIECES_PERSONAL_ACCESS_TOKEN || github.token }}
          persist-credentials: true

      - uses: dart-lang/setup-dart@v1.7.2
        with:
          sdk: "3.9.2"

      - name: Format code
        run: dart format --line-length 120 .

      - name: Commit and push formatting
        id: format-push
        run: |
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -u -- '*.dart'
            git commit -m "bot(format): apply dart format --line-length 120 [skip ci]"
            if git push; then
              echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
              echo "::notice::Formatting changes committed and pushed."
            else
              echo "::warning::Could not push formatting changes (branch may be protected or this is a fork PR)."
            fi
          else
            echo "Code is already formatted."
          fi

  analyze:
    needs: [pre-check, auto-format]
    if: needs.pre-check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      # ── shared:checkout ──
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.auto-format.outputs.sha }}
          fetch-depth: 1
          persist-credentials: false

      # ── shared:git-config ──
      - name: Configure Git for HTTPS with Token
        shell: bash
        env:
          GH_PAT: ${{ secrets.TSAVO_AT_PIECES_PERSONAL_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          echo "::add-mask::${GH_PAT}"
          git config --global url."https://x-access-token:${GH_PAT}@github.com/".insteadOf "git@github.com:"
          git config --global url."https://x-access-token:${GH_PAT}@github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://x-access-token:${GH_PAT}@github.com/".insteadOf "https://github.com/"
          git config --global url."https://x-access-token:${GH_PAT}@github.com/open-runtime/".insteadOf "git@github.com:open-runtime/"
          git config --global url."https://x-access-token:${GH_PAT}@github.com/pieces-app/".insteadOf "git@github.com:pieces-app/"

      # ── shared:dart-setup ──
      - uses: dart-lang/setup-dart@v1.7.2
        with:
          sdk: "3.9.2"

      # ── shared:pub-cache ──
      # Windows: %LOCALAPPDATA%\Pub\Cache (Dart default). Unix: ~/.pub-cache
      - name: Cache Dart pub dependencies
        uses: actions/cache@v5
        with:
          path: ${{ runner.os == 'Windows' && format('{0}\\Pub\\Cache', env.LOCALAPPDATA) || '~/.pub-cache' }}
          key: ${{ runner.os }}-${{ runner.arch }}-dart-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-dart-pub-

      # ── shared:proto-setup ──
      # ── shared:pub-get ──
      - run: dart pub get
        env:
          GIT_LFS_SKIP_SMUDGE: "1"
      - name: Activate runtime_ci_tooling (pub global)
        run: dart pub global activate --source git https://github.com/open-runtime/runtime_ci_tooling.git --git-ref v0.23.10

      # ── shared:analysis-cache ──
      # ── shared:proto-verify ──
      # ── shared:analyze ──
      - name: Analyze
        run: |
          dart analyze 2>&1 | tee "$RUNNER_TEMP/analysis.txt"
          if grep -q "^  error -" "$RUNNER_TEMP/analysis.txt"; then
            echo "::error::Analysis errors found"
            exit 1
          fi

      # ── shared:sub-packages ──
  test:
    needs: [pre-check, analyze, auto-format]
    if: needs.pre-check.outputs.should_run == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: [{"platform_id":"ubuntu-x64","runner":"runtime-ubuntu-24.04-x64-256gb-64core","os_family":"linux","arch":"x64"},{"platform_id":"ubuntu-arm64","runner":"runtime-ubuntu-24.04-arm64-208gb-64core","os_family":"linux","arch":"arm64"},{"platform_id":"macos-arm64","runner":"macos-latest","os_family":"macos","arch":"arm64"},{"platform_id":"macos-x64","runner":"macos-15-large","os_family":"macos","arch":"x64"},{"platform_id":"windows-x64","runner":"runtime-windows-2025-x64-256gb-64core","os_family":"windows","arch":"x64"},{"platform_id":"windows-arm64","runner":"runtime-windows-11-arm64-208gb-64core","os_family":"windows","arch":"arm64"}]
    steps:
      # ── shared:checkout ──
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.auto-format.outputs.sha }}
          fetch-depth: 1
          persist-credentials: false

      # ── shared:git-config ──
      - name: Configure Git for HTTPS with Token
        shell: bash
        env:
          GH_PAT: ${{ secrets.TSAVO_AT_PIECES_PERSONAL_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          echo "::add-mask::${GH_PAT}"
          git config --global url."https://x-access-token:${GH_PAT}@github.com/".insteadOf "git@github.com:"
          git config --global url."https://x-access-token:${GH_PAT}@github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://x-access-token:${GH_PAT}@github.com/".insteadOf "https://github.com/"
          git config --global url."https://x-access-token:${GH_PAT}@github.com/open-runtime/".insteadOf "git@github.com:open-runtime/"
          git config --global url."https://x-access-token:${GH_PAT}@github.com/pieces-app/".insteadOf "git@github.com:pieces-app/"

      # ── shared:dart-setup ──
      - uses: dart-lang/setup-dart@v1.7.2
        with:
          sdk: "3.9.2"

      # ── shared:pub-cache ──
      # Windows: %LOCALAPPDATA%\Pub\Cache (Dart default). Unix: ~/.pub-cache
      - name: Cache Dart pub dependencies
        uses: actions/cache@v5
        with:
          path: ${{ runner.os == 'Windows' && format('{0}\\Pub\\Cache', env.LOCALAPPDATA) || '~/.pub-cache' }}
          key: ${{ runner.os }}-${{ runner.arch }}-dart-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-dart-pub-

      # ── shared:proto-setup ──
      # ── shared:pub-get ──
      - run: dart pub get
        env:
          GIT_LFS_SKIP_SMUDGE: "1"
      - name: Activate runtime_ci_tooling (pub global)
        run: dart pub global activate --source git https://github.com/open-runtime/runtime_ci_tooling.git --git-ref v0.23.10


      - name: Check test enabled in config
        id: check-test
        shell: bash
        run: |
          if [ -f .runtime_ci/config.json ]; then
            enabled=$(jq -r '.ci.features.test' .runtime_ci/config.json)
            if [ "$enabled" = "null" ]; then
              enabled="true"
            fi
          else
            enabled="true"
          fi
          echo "enabled=$enabled" >> "$GITHUB_OUTPUT"
          if [ "$enabled" != "true" ]; then
            echo "::notice::Tests disabled in .runtime_ci/config.json — skipping test steps."
          fi

# --- BEGIN USER: pre-test ---
# --- END USER: pre-test ---

      # ── shared:test ──
      - name: Test
        if: steps.check-test.outputs.enabled == 'true'
        run: dart test

      - name: Upload test artifacts on failure
        if: steps.check-test.outputs.enabled == 'true' && failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-artifacts-${{ matrix.platform_id }}
          path: |
            test/integration/fixtures/bin/
            **/test-results/
          retention-days: 7

# --- BEGIN USER: post-test ---
# --- END USER: post-test ---
  # ── Docs Freshness Check ────────────────────────────────────────────────
  # Verifies that documentation hashes match source; fails if docs are stale.
  # No Gemini API key needed — this is a pure hash comparison (--dry-run).
  #
  # Dynamic toggle: set ci.features.autodoc to false in .runtime_ci/config.json
  # to skip at runtime without regenerating workflows.
  #
  # Requires the same Git HTTPS rewrite + pub get as analyze/test. runtime_ci_tooling
  # is activated globally (see shared_setup_through_build), not via dev_dependencies.
  docs-freshness:
    needs: [pre-check, auto-format]
    if: needs.pre-check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.auto-format.outputs.sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Check autodoc enabled in config
        id: check-autodoc
        shell: bash
        run: |
          if [ -f .runtime_ci/config.json ]; then
            enabled=$(jq -r '.ci.features.autodoc' .runtime_ci/config.json)
            if [ "$enabled" = "null" ]; then
              enabled="true"
            fi
          else
            enabled="true"
          fi
          echo "enabled=$enabled" >> "$GITHUB_OUTPUT"
          if [ "$enabled" != "true" ]; then
            echo "::notice::Autodoc disabled in .runtime_ci/config.json — skipping docs freshness check."
          fi

      - name: Configure Git for HTTPS with Token
        if: steps.check-autodoc.outputs.enabled == 'true'
        shell: bash
        env:
          GH_PAT: ${{ secrets.TSAVO_AT_PIECES_PERSONAL_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          echo "::add-mask::${GH_PAT}"
          git config --global url."https://x-access-token:${GH_PAT}@github.com/".insteadOf "git@github.com:"
          git config --global url."https://x-access-token:${GH_PAT}@github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://x-access-token:${GH_PAT}@github.com/".insteadOf "https://github.com/"
          git config --global url."https://x-access-token:${GH_PAT}@github.com/open-runtime/".insteadOf "git@github.com:open-runtime/"
          git config --global url."https://x-access-token:${GH_PAT}@github.com/pieces-app/".insteadOf "git@github.com:pieces-app/"

      - uses: dart-lang/setup-dart@v1.7.2
        if: steps.check-autodoc.outputs.enabled == 'true'
        with:
          sdk: "3.9.2"

      - name: Cache Dart pub dependencies
        if: steps.check-autodoc.outputs.enabled == 'true'
        uses: actions/cache@v5
        with:
          path: ${{ runner.os == 'Windows' && format('{0}\\Pub\\Cache', env.LOCALAPPDATA) || '~/.pub-cache' }}
          key: ${{ runner.os }}-${{ runner.arch }}-dart-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-dart-pub-

      - name: Get dependencies
        if: steps.check-autodoc.outputs.enabled == 'true'
        run: dart pub get
        env:
          GIT_LFS_SKIP_SMUDGE: "1"

      - name: Activate runtime_ci_tooling (pub global)
        if: steps.check-autodoc.outputs.enabled == 'true'
        run: dart pub global activate --source git https://github.com/open-runtime/runtime_ci_tooling.git --git-ref v0.23.10

      - name: Check docs freshness
        if: steps.check-autodoc.outputs.enabled == 'true'
        run: dart pub global run runtime_ci_tooling:manage_cicd autodoc --dry-run
# --- BEGIN USER: extra-jobs ---
# --- END USER: extra-jobs ---

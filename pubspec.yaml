name: runtime_named_locks
homepage: https://pieces.app
repository: https://github.com/open-runtime/named_locks
version: 1.0.0-beta.5
description: A library for creating and managing named locks which leverages Dart FFI and Native Named Semaphores across macOS, Linux, and Windows.
publish_to: none

environment:
  sdk: ^3.9.0

resolution: workspace

platforms:
  linux:
  macos:
  windows:

dependencies:
  stack_trace: ^1.11.1
  runtime_native_semaphores: ^1.0.0-beta.7

dev_dependencies:
  runtime_ci_tooling:
    git:
      url: git@github.com:open-runtime/runtime_ci_tooling.git
      tag_pattern: v{{version}}
    version: ^0.8.0
  test: ^1.25.5
  safe_int_id: ^1.1.1
